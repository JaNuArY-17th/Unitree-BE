name: Deploy Unitree BE

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Create app directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p ~/apps/unitree

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: "~/apps/unitree"
          rm: true

      - name: Docker Compose Up
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: ENV_FILE,FIREBASE_PRIVATE_KEY
          script: |
            cd ~/apps/unitree

            # Ghi toàn bộ ENV_FILE vào .env (trừ FIREBASE_PRIVATE_KEY)
            printf '%s' "$ENV_FILE" | grep -v "FIREBASE_PRIVATE_KEY" > .env

            # Xử lý FIREBASE_PRIVATE_KEY: convert \n literal → newline thật
            REAL_KEY=$(printf '%s' "$FIREBASE_PRIVATE_KEY" | sed 's/\\n/\n/g')
            printf 'FIREBASE_PRIVATE_KEY="%s"\n' "$REAL_KEY" >> .env

            docker compose down
            docker compose up -d --build
            docker image prune -f
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}